<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dashboard | SkyBridge Logistics Admin</title>
  <meta name="robots" content="noindex, nofollow" />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Unbounded:wght@500;600;700;800&family=Plus+Jakarta+Sans:wght@400;500;600&family=JetBrains+Mono:wght@500;600&display=swap" rel="stylesheet" />

  <link rel="stylesheet" href="../assets/css/style.css" />
  <link rel="stylesheet" href="css/admin.css" />

  <script src="https://code.iconify.design/iconify-icon/2.1.0/iconify-icon.min.js" defer></script>
</head>
<body class="admin-body">

  <div class="admin-shell">

    <div class="admin-sidebar-overlay" id="admin-sidebar-overlay" hidden></div>

    <!-- ===================== SIDEBAR ===================== -->
    <aside class="admin-sidebar" id="admin-sidebar">
      <div class="admin-sidebar__brand">
        <img src="../assets/css/images/WhatsApp Image 2026-07-19 at 08.20.53.jpeg" alt="SkyBridge Logistics" class="admin-sidebar__logo" />
        <button type="button" class="admin-sidebar__close" id="admin-sidebar-close" aria-label="Close menu">
          <iconify-icon icon="ph:x-bold" aria-hidden="true"></iconify-icon>
        </button>
      </div>

      <nav class="admin-nav" aria-label="Admin">
        <a href="dashboard.html" class="admin-nav__link is-active">
          <iconify-icon icon="ph:squares-four-bold" aria-hidden="true"></iconify-icon>
          Dashboard
        </a>
        <a href="shipment-form.html" class="admin-nav__link">
          <iconify-icon icon="ph:plus-circle-bold" aria-hidden="true"></iconify-icon>
          Create Shipment
        </a>
        <a href="shipments.html" class="admin-nav__link">
          <iconify-icon icon="ph:package-bold" aria-hidden="true"></iconify-icon>
          All Shipments
        </a>
        <a href="settings.html" class="admin-nav__link">
          <iconify-icon icon="ph:gear-six-bold" aria-hidden="true"></iconify-icon>
          Settings
        </a>
      </nav>

      <button type="button" class="admin-nav__link admin-nav__logout" id="admin-logout">
        <iconify-icon icon="ph:sign-out-bold" aria-hidden="true"></iconify-icon>
        Logout
      </button>
    </aside>

    <!-- ===================== MAIN ===================== -->
    <div class="admin-main">

      <!-- Topbar -->
      <header class="admin-topbar">
        <div class="admin-topbar__left">
          <button type="button" class="admin-topbar__menu-toggle" id="admin-menu-toggle" aria-label="Open menu" aria-expanded="false" aria-controls="admin-sidebar">
            <iconify-icon icon="ph:list-bold" aria-hidden="true"></iconify-icon>
          </button>
          <div>
            <p class="admin-topbar__eyebrow">Dashboard</p>
            <h1 class="admin-topbar__title">Welcome back, Admin</h1>
          </div>
        </div>

        <div class="admin-topbar__actions">
          <a href="shipment-form.html" class="admin-btn admin-btn--primary">
            <iconify-icon icon="ph:plus-bold" aria-hidden="true"></iconify-icon>
            Create Shipment
          </a>
          <div class="admin-topbar__user">
            <span class="admin-topbar__avatar">A</span>
          </div>
        </div>
      </header>

      <main class="admin-content">

        <!-- Stat cards -->
        <div class="admin-stats">
          <div class="admin-stat-card">
            <span class="admin-stat-card__icon admin-stat-card__icon--total">
              <iconify-icon icon="ph:package-bold" aria-hidden="true"></iconify-icon>
            </span>
            <div>
              <span class="admin-stat-card__number" data-count-to="428">0</span>
              <span class="admin-stat-card__label">Total Shipments</span>
            </div>
          </div>

          <div class="admin-stat-card">
            <span class="admin-stat-card__icon admin-stat-card__icon--transit">
              <iconify-icon icon="ph:truck-bold" aria-hidden="true"></iconify-icon>
            </span>
            <div>
              <span class="admin-stat-card__number" data-count-to="132">0</span>
              <span class="admin-stat-card__label">In Transit</span>
            </div>
          </div>

          <div class="admin-stat-card">
            <span class="admin-stat-card__icon admin-stat-card__icon--delivered">
              <iconify-icon icon="ph:check-circle-bold" aria-hidden="true"></iconify-icon>
            </span>
            <div>
              <span class="admin-stat-card__number" data-count-to="260">0</span>
              <span class="admin-stat-card__label">Delivered</span>
            </div>
          </div>

          <div class="admin-stat-card">
            <span class="admin-stat-card__icon admin-stat-card__icon--pending">
              <iconify-icon icon="ph:clock-bold" aria-hidden="true"></iconify-icon>
            </span>
            <div>
              <span class="admin-stat-card__number" data-count-to="36">0</span>
              <span class="admin-stat-card__label">Pending</span>
            </div>
          </div>
        </div>

        <!-- Recent shipments -->
        <div class="admin-panel">
          <div class="admin-panel__header">
            <h2 class="admin-panel__title">Recent Shipments</h2>
            <a href="shipments.html" class="admin-panel__link">
              View All
              <iconify-icon icon="ph:arrow-right-bold" aria-hidden="true"></iconify-icon>
            </a>
          </div>

          <div class="admin-table-wrap">
            <table class="admin-table" id="recent-shipments-table">
              <thead>
                <tr>
                  <th>Tracking Number</th>
                  <th>Customer</th>
                  <th>Destination</th>
                  <th>Status</th>
                  <th>Est. Delivery</th>
                </tr>
              </thead>
              <tbody>
                <!-- Populated by js/dashboard.js from demo data,
                     shaped like the future GET /api/shipments response. -->
              </tbody>
            </table>
          </div>
        </div>

      </main>
    </div>
  </div>

  <script src="js/admin-nav.js" defer></script>
  <script src="js/auth-guard.js" defer></script>
  <script src="js/dashboard.js" defer></script>
</body>
</html>
